<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Standard solid background for safe maskable zone -->
  <rect width="512" height="512" fill="#0f172a" />
  <!-- Scaled down group for safe zone -->
  <g transform="translate(38, 38) scale(0.85)" filter="url(#glow)">
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#grad)" stroke-width="16" />
    <rect x="166" y="186" width="180" height="120" rx="16" fill="none" stroke="#ffffff" stroke-width="14" />
    <path d="M226,306 L216,340 L296,340 L286,306" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <line x1="186" y1="340" x2="326" y2="340" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    <circle cx="256" cy="246" r="36" fill="url(#grad)" />
  </g>
</svg>
